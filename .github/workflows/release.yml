name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  ZIG_VERSION: 0.16.0

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-15
            target: darwin-arm64
            artifact_name: openmux-darwin-arm64
          - os: ubuntu-24.04-arm
            target: linux-arm64
            artifact_name: openmux-linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Get libgit2 revision
        id: libgit2
        run: echo "rev=$(git -C vendor/libgit2 rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache libgit2 build
        uses: actions/cache@v4
        with:
          path: native/zig-git/zig-out/libgit2
          key: libgit2-${{ runner.os }}-${{ runner.arch }}-${{ env.ZIG_VERSION }}-${{ steps.libgit2.outputs.rev }}-${{ hashFiles('native/zig-git/build.zig') }}

      - name: Setup CMake
        run: |
          if command -v cmake >/dev/null 2>&1; then
            cmake --version
            exit 0
          fi
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y cmake
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install cmake
          else
            echo "Unsupported OS for cmake install" >&2
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        id: build
        run: ./scripts/build.sh --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*.tar.gz
          retention-days: 1

  build-linux-x64-redhat8:
    runs-on: ubuntu-latest
    container: almalinux:8

    steps:
      - name: Install build dependencies
        run: |
          dnf install -y \
            bash \
            binutils \
            ca-certificates \
            curl \
            file \
            findutils \
            gcc \
            gcc-c++ \
            git \
            gzip \
            make \
            openssl \
            python3 \
            rpm-build \
            sed \
            tar \
            unzip \
            xz
          update-ca-trust

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Get libgit2 revision
        id: libgit2
        run: echo "rev=$(git -C vendor/libgit2 rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache libgit2 build
        uses: actions/cache@v4
        with:
          path: native/zig-git/zig-out/libgit2
          key: libgit2-redhat8-x64-${{ env.ZIG_VERSION }}-${{ steps.libgit2.outputs.rev }}-${{ hashFiles('native/zig-git/build.zig') }}

      - name: Setup CMake
        run: |
          if command -v cmake >/dev/null 2>&1; then
            cmake --version
            exit 0
          fi
          dnf install -y cmake

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build Red Hat 8 compatible tarball
        id: build
        run: ./scripts/build.sh --release

      - name: Verify GLIBC compatibility
        run: |
          set -euo pipefail
          glibc_symbols="$({ find dist -maxdepth 1 -type f \( -name 'openmux-bin' -o -name '*.so' \) -print0 | xargs -0 -r objdump -T; } | grep -Eo 'GLIBC_[0-9]+\.[0-9]+' || true)"
          too_new_symbols="$(
            printf '%s\n' "$glibc_symbols" |
              sort -Vu |
              awk -F_ '{ split($2, v, "."); if (v[1]+0 > 2 || (v[1]+0 == 2 && v[2]+0 > 28)) print $0 }'
          )"
          if [ -n "$too_new_symbols" ]; then
            echo "Found GLIBC symbols newer than Red Hat 8 glibc 2.28:" >&2
            echo "$too_new_symbols" >&2
            exit 1
          fi

      - name: Build RPM
        run: ./scripts/build-rpm.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openmux-linux-x64-redhat8
          path: |
            dist/*.tar.gz
            dist/*.rpm
          retention-days: 1

  release:
    needs:
      - build
      - build-linux-x64-redhat8
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f \( -name "*.tar.gz" -o -name "*.rpm" \)

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.rpm
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
