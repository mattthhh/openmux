name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ZIG_VERSION: 0.16.0

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Zig
        shell: bash
        run: |
          set -euxo pipefail
          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64) zig_target=x86_64-linux ;;
            Linux-aarch64|Linux-arm64) zig_target=aarch64-linux ;;
            Darwin-arm64) zig_target=aarch64-macos ;;
            Darwin-x86_64) zig_target=x86_64-macos ;;
            *)
              echo "Unsupported runner: $(uname -s)-$(uname -m)" >&2
              exit 1
              ;;
          esac

          archive="zig-${zig_target}-${ZIG_VERSION}.tar.xz"
          url="https://ziglang.org/download/${ZIG_VERSION}/${archive}"
          install_dir="$RUNNER_TEMP/zig-${ZIG_VERSION}"

          rm -rf "$install_dir"
          mkdir -p "$install_dir"
          curl -L --fail --silent --show-error "$url" -o "$RUNNER_TEMP/$archive"
          tar -xJf "$RUNNER_TEMP/$archive" -C "$install_dir" --strip-components=1
          echo "$install_dir" >> "$GITHUB_PATH"
          "$install_dir/zig" version

      - name: Get libgit2 revision
        id: libgit2
        run: echo "rev=$(git -C vendor/libgit2 rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache libgit2 build
        uses: actions/cache@v5
        with:
          path: native/zig-git/zig-out/libgit2
          key: libgit2-${{ runner.os }}-${{ runner.arch }}-${{ env.ZIG_VERSION }}-${{ steps.libgit2.outputs.rev }}-${{ hashFiles('native/zig-git/build.zig') }}

      - name: Cache native libraries
        uses: actions/cache@v5
        with:
          path: |
            native/zig-pty/zig-out/lib
            native/zig-git/zig-out/lib
            native/zig-ghostty-wrapper/zig-out/lib
          key: native-libs-${{ runner.os }}-${{ runner.arch }}-${{ env.ZIG_VERSION }}-${{ hashFiles('native/zig-pty/build.zig', 'native/zig-pty/src/**/*.zig', 'native/zig-git/build.zig', 'native/zig-git/src/**/*.zig', 'native/zig-ghostty-wrapper/build.zig', 'native/zig-ghostty-wrapper/src/**/*.zig', 'native/zig-ghostty-wrapper/compat/**/*', 'vendor/ghostty/**/*.zig') }}

      - name: Setup CMake
        run: |
          if command -v cmake >/dev/null 2>&1; then
            cmake --version
            exit 0
          fi
          sudo apt-get update && sudo apt-get install -y cmake

      - name: Setup zsh (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y zsh

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build native libraries
        run: |
          # Check if libraries are already cached
          if [ -f "native/zig-pty/zig-out/lib/libzig_pty.so" ] && \
             [ -f "native/zig-git/zig-out/lib/libzig_git.so" ] && \
             [ -f "native/zig-ghostty-wrapper/zig-out/lib/libghostty-vt.so" ]; then
            echo "Native libraries found in cache, skipping build"
          else
            echo "Building native libraries..."
            cd native/zig-pty && zig build -Doptimize=ReleaseFast
            cd ../zig-git && zig build -Doptimize=ReleaseFast
            cd ../zig-ghostty-wrapper && zig build -Doptimize=ReleaseFast
          fi

      - name: Type check
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Run TypeScript tests with coverage
        run: bun run test:ts --coverage

      - name: Run Zig PTY tests (Linux)
        run: cd native/zig-pty && zig build test --summary all

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false
          verbose: true

  test-zig:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Zig
        shell: bash
        run: |
          set -euxo pipefail
          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64) zig_target=x86_64-linux ;;
            Linux-aarch64|Linux-arm64) zig_target=aarch64-linux ;;
            Darwin-arm64) zig_target=aarch64-macos ;;
            Darwin-x86_64) zig_target=x86_64-macos ;;
            *)
              echo "Unsupported runner: $(uname -s)-$(uname -m)" >&2
              exit 1
              ;;
          esac

          archive="zig-${zig_target}-${ZIG_VERSION}.tar.xz"
          url="https://ziglang.org/download/${ZIG_VERSION}/${archive}"
          install_dir="$RUNNER_TEMP/zig-${ZIG_VERSION}"

          rm -rf "$install_dir"
          mkdir -p "$install_dir"
          curl -L --fail --silent --show-error "$url" -o "$RUNNER_TEMP/$archive"
          tar -xJf "$RUNNER_TEMP/$archive" -C "$install_dir" --strip-components=1
          echo "$install_dir" >> "$GITHUB_PATH"
          "$install_dir/zig" version

      - name: Get libgit2 revision
        id: libgit2
        run: echo "rev=$(git -C vendor/libgit2 rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache libgit2 build
        uses: actions/cache@v5
        with:
          path: native/zig-git/zig-out/libgit2
          key: libgit2-${{ runner.os }}-${{ runner.arch }}-${{ env.ZIG_VERSION }}-${{ steps.libgit2.outputs.rev }}-${{ hashFiles('native/zig-git/build.zig') }}

      - name: Setup CMake
        run: |
          if command -v cmake >/dev/null 2>&1; then
            cmake --version
            exit 0
          fi
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y cmake
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install cmake
          else
            echo "Unsupported OS for cmake install" >&2
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run Zig tests
        run: cd native/zig-pty && zig build test --summary all

      - name: Run Zig git tests
        run: cd native/zig-git && zig build test --summary all

      - name: Run Ghostty VT tests
        run: bun run test:zig-ghostty-wrapper
